name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: /home/runner/.cargo
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p cha-cli -p cha-lsp
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            target/release/cha
            target/release/cha-lsp
          retention-days: 1

  check:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: target/release/
      - run: chmod +x target/release/cha target/release/cha-lsp
      - run: cargo test --workspace

  analyze:
    name: Analyze & LSP
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: target/release/
      - run: chmod +x target/release/cha target/release/cha-lsp
      - run: |
          echo "$PWD/target/release" >> $GITHUB_PATH
          cargo xtask analyze
      - run: cargo xtask lsp-test

  plugin:
    name: Plugin Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: target/release/
      - run: chmod +x target/release/cha
      - run: |
          echo "$PWD/target/release" >> $GITHUB_PATH
          cargo xtask plugin-test
      - run: cargo xtask plugin-e2e

  vscode:
    name: VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & type-check
        working-directory: vscode-cha
        run: |
          npm install
          npx tsc --noEmit
      - name: Package .vsix
        working-directory: vscode-cha
        run: npx @vscode/vsce package --allow-missing-repository
      - name: Download e2e test
        working-directory: vscode-cha
        run: npx tsx test/download.test.ts
