name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: /home/runner/.cargo
  CARGO_INCREMENTAL: 0

jobs:
  check:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          key: check
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test
      - run: cargo test --workspace

  build-and-analyze:
    name: Build & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: build
      - name: Build release
        run: cargo build --release -p cha-cli
      - name: Analyze (self-check)
        run: |
          echo "$PWD/target/release" >> $GITHUB_PATH
          cargo xtask analyze
      - name: LSP smoke test
        run: cargo xtask lsp-test
      - name: Upload cha binary
        uses: actions/upload-artifact@v4
        with:
          name: cha-binary
          path: target/release/cha
          retention-days: 1

  plugin:
    name: Plugin Tests
    runs-on: ubuntu-latest
    needs: build-and-analyze
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          key: plugin
      - name: Download cha binary
        uses: actions/download-artifact@v4
        with:
          name: cha-binary
          path: target/release/
      - run: chmod +x target/release/cha
      - name: Plugin tests
        run: |
          echo "$PWD/target/release" >> $GITHUB_PATH
          cargo xtask plugin-test
      - name: Plugin e2e
        run: cargo xtask plugin-e2e
