# Build the Cha docs site (oranda landing + mdbook EN/zh-CN) and deploy to gh-pages.
name: Web

permissions:
  contents: write

on:
  pull_request:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  web:
    name: Build and deploy site and docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      # mdbook + preprocessors (cached across runs by version+rustc+os).
      # First run compiles each crate (~5 min total cold); cache hits ~5s.
      - name: Install mdbook
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: mdbook@0.4.40
      - name: Install mdbook-admonish
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: mdbook-admonish@1.20.0
      - name: Install mdbook-mermaid
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: mdbook-mermaid@0.17.0
      - name: Install mdbook-pagetoc
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: mdbook-pagetoc@0.3.0
      - name: Install mdbook-tabs
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: mdbook-tabs@1.0.1
      - name: Install mdbook-linkcheck
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: mdbook-linkcheck@0.7.7

      # Each plugin's `install` command writes its CSS/JS into the book dir
      # and amends book.toml with `additional-css` / `additional-js`. Idempotent.
      - name: Install mdbook plugin assets
        run: |
          mdbook-admonish install book
          mdbook-mermaid install book

      # oranda links mdbook as a library, picks up book/ via auto-detect,
      # and respects book.toml's preprocessor list.
      - name: Build site
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/oranda/releases/latest/download/oranda-installer.sh | sh
          oranda build

      # Re-run mdbook against the same book.toml with MDBOOK_BOOK__SRC
      # overridden so the zh-CN tree builds without a second book.toml.
      # `-d` is relative to the mdbook source dir (book/), hence the
      # absolute path via $GITHUB_WORKSPACE so it lands in public/.
      - name: Build zh-CN docs
        env:
          MDBOOK_BOOK__SRC: src-zh-CN
          MDBOOK_BOOK__LANGUAGE: zh-CN
          MDBOOK_OUTPUT__HTML__SITE_URL: /book/zh-CN/
        run: |
          out="$GITHUB_WORKSPACE/public/book/zh-CN"
          mdbook build book -d "$out"
          # mdbook nests html/ under -d; flatten so /book/zh-CN/index.html
          # mirrors /book/index.html (which oranda already flattens for the
          # English tree). Glob would miss .nojekyll, hence find.
          (cd "$out/html" && find . -mindepth 1 -maxdepth 1 -exec mv {} "$out/" \;)
          rmdir "$out/html"
          rm -rf "$out/linkcheck"

      - name: Deploy to Github Pages
        uses: JamesIves/github-pages-deploy-action@v4.6.4
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          branch: gh-pages
          folder: public
          token: ${{ secrets.GITHUB_TOKEN }}
          single-commit: true
