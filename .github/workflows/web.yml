# Build the Cha docs site (oranda landing + mdbook EN/zh-CN) and deploy to gh-pages.
name: Web

permissions:
  contents: write

on:
  pull_request:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  web:
    name: Build and deploy site and docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      # mdbook is needed for the second (zh-CN) build below; oranda links
      # mdbook as a library for the EN build, but the explicit zh re-run
      # needs the binary on PATH.
      - name: Install mdbook
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: mdbook@0.4.40

      # CLI manual page {{#include}}s target/cli-help.md, so we generate
      # it from the cha binary before mdbook runs. This keeps the page
      # in lockstep with the actual --help output without a checked-in
      # snapshot to drift.
      - name: Build cha (release) for docgen
        run: cargo build --release -p cha-cli

      - name: Generate CLI manual snapshot
        run: cargo xtask docgen-cli

      - name: Build site
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/oranda/releases/latest/download/oranda-installer.sh | sh
          oranda build

      # Re-run mdbook against the same book.toml with MDBOOK_BOOK__SRC
      # overridden so the zh-CN tree builds without a second book.toml.
      # `-d` is relative to the mdbook source dir (book/), hence the
      # absolute path via $GITHUB_WORKSPACE so it lands in public/.
      - name: Build zh-CN docs
        env:
          MDBOOK_BOOK__SRC: src-zh-CN
          MDBOOK_BOOK__LANGUAGE: zh-CN
          MDBOOK_OUTPUT__HTML__SITE_URL: /book/zh-CN/
        run: |
          out="$GITHUB_WORKSPACE/public/book/zh-CN"
          mdbook build book -d "$out"

      # mdbook's built-in elasticlunr search drops non-ASCII tokens, so the
      # zh-CN tree has no working search out of the box. Pagefind crawls
      # the rendered HTML and produces a CJK-aware index per language.
      - name: Install Pagefind
        run: |
          curl -fsSL https://github.com/CloudCannon/pagefind/releases/download/v1.4.0/pagefind-v1.4.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz -C /usr/local/bin

      - name: Index search (Pagefind)
        run: |
          pagefind --site public/book
          pagefind --site public/book/zh-CN

      - name: Deploy to Github Pages
        uses: JamesIves/github-pages-deploy-action@v4.6.4
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          branch: gh-pages
          folder: public
          token: ${{ secrets.GITHUB_TOKEN }}
          single-commit: true
