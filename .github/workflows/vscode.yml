name: VS Code Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build
        working-directory: vscode-cha
        run: |
          npm install
          npm run compile
          npx @vscode/vsce package --allow-missing-repository

      - name: Publish to Marketplace
        if: env.VSCE_PAT != ''
        working-directory: vscode-cha
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish -p "$VSCE_PAT" --allow-missing-repository

      - name: Upload vsix to Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Wait for release to be created by cargo-dist
          for i in $(seq 1 60); do
            if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
              break
            fi
            echo "Waiting for release... ($i/60)"
            sleep 30
          done
          gh release upload "${{ github.ref_name }}" vscode-cha/*.vsix --repo "${{ github.repository }}" --clobber
