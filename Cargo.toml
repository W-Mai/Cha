[workspace]
members = ["cha-core", "cha-parser", "cha-cli", "cha-lsp", "xtask"]
exclude = ["examples/wasm-plugin-example"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
cha-core = { path = "cha-core" }
cha-parser = { path = "cha-parser" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
tree-sitter = "0.25"
